name: Render CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  static-site-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript
        run: node --check script.js

      - name: Build public config
        run: node scripts/build-config.js

      - name: Verify static site files
        run: test -f index.html && test -f render.yaml && test -f script.js && test -f styles.css
